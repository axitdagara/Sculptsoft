[alembic]
script_location = alembic
# The real URL is loaded at runtime from the `.env` file by `alembic/env.py`.
# Keep a harmless placeholder here to avoid committing secrets.
sqlalchemy.url = postgresql+psycopg2://postgres:123456789@localhost:5432/library_managementt

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
